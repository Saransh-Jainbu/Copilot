name: DevOps Copilot CI

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  # --- Lint ---
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linter
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/ tests/

  # --- Test ---
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        id: run-tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-report=html 2>&1 | tee test-output.log
        continue-on-error: true

      - name: Upload test logs and coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-output.log
            coverage.xml
            htmlcov/

      - name: Fail job if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

  # --- Docker Build ---
  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devops-copilot:${{ github.sha }} .

      - name: Test Docker image
        run: |
          docker run --rm -d --name copilot-test -p 8000:8000 devops-copilot:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/api/health || exit 1
          docker stop copilot-test

  diagnose:
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: always() && (needs.test.result == 'failure' || needs['docker-build'].result == 'failure')
    steps:
      - uses: actions/checkout@v4

      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: artifacts
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt --quiet
          pip install requests --quiet

      - name: Start Copilot API
        env:
          HUGGINGFACE_API_TOKEN: ${{ secrets.HUGGINGFACE_API_TOKEN }}
        run: |
          python -m uvicorn src.api.main:app --host 127.0.0.1 --port 8000 > api.log 2>&1 &
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8000/api/health > /dev/null 2>&1; then
              echo "API is ready"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start"
          cat api.log
          exit 1

      - name: Run diagnosis
        run: |
          python scripts/diagnose_workflow_failure.py \
            --artifacts-dir artifacts \
            --api-url http://127.0.0.1:8000
        continue-on-error: true

      - name: Post diagnosis comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            if (!fs.existsSync('diagnosis_result.json')) {
              console.log('No diagnosis result found, skipping comment');
              return;
            }
            const diagnosis = JSON.parse(fs.readFileSync('diagnosis_result.json', 'utf8'));
            const issueType = diagnosis.classification?.category || 'Unknown';
            const confidence = ((diagnosis.confidence || 0) * 100).toFixed(1);
            const latency = diagnosis.total_latency_ms || 'N/A';
            const diagnosisText = diagnosis.diagnosis || 'Unable to determine root cause';
            const suggestions = (diagnosis.fix_suggestions || []).slice(0, 5).map((s, i) => `${i + 1}. ${s}`).join('\n');
            const patch = diagnosis.patch_recommendation || '';

            let comment = `## Automated CI/CD Failure Diagnosis\n\n`;
            comment += `**Issue Type:** ${issueType}\n\n`;
            comment += `### Root Cause\n${diagnosisText}\n\n`;
            comment += `### Suggested Fixes\n${suggestions || 'No suggestions available'}\n`;
            if (patch && patch.length < 500) {
              comment += `\n### Recommended Patch\n\`\`\`\n${patch}\n\`\`\`\n`;
            }
            comment += `\n**Confidence:** ${confidence}%\n`;
            comment += `**Analysis Time:** ${latency}ms`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: comment
            });

      - name: Stop API
        if: always()
        run: pkill -f "uvicorn" || true
