name: Diagnose CI/CD Failures

on:
  workflow_run:
    workflows: ["DevOps Copilot CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: read
  checks: read

jobs:
  diagnose:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          path: artifacts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt --quiet
          pip install requests --quiet

      - name: Build and start Copilot API
        id: start-api
        env:
          HUGGINGFACE_API_TOKEN: ${{ secrets.HUGGINGFACE_API_TOKEN }}
        run: |
          echo "Starting Copilot API..."
          python -m uvicorn src.api.main:app --host 127.0.0.1 --port 8000 > api.log 2>&1 &
          
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8000/api/health > /dev/null 2>&1; then
              echo "API is ready!"
              echo "api-ready=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done
          
          echo "API failed to start after 60 seconds"
          cat api.log
          echo "api-ready=false" >> $GITHUB_OUTPUT
          exit 0
        continue-on-error: true

      - name: Diagnose workflow failure
        id: diagnose
        if: steps.start-api.outputs.api-ready == 'true'
        run: |
          echo "Running diagnosis..."
          python scripts/diagnose_workflow_failure.py \
            --artifacts-dir artifacts \
            --api-url http://127.0.0.1:8000
        continue-on-error: true

      - name: Find associated PR
        if: always()
        id: find-pr
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ github.event.workflow_run.head_branch }}';
            console.log('Looking for PR on branch:', branch);
            
            if (!branch) {
              console.log('No branch info available');
              return;
            }
            
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: branch
            });
            
            if (prs.data.length > 0) {
              console.log('Found PR:', prs.data[0].number);
              core.setOutput('pr-number', prs.data[0].number);
              core.setOutput('found-pr', 'true');
            } else {
              console.log('No open PR found for this branch');
              core.setOutput('found-pr', 'false');
            }

      - name: Post diagnosis as PR comment
        if: steps.find-pr.outputs.found-pr == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            
            if (!fs.existsSync('diagnosis_result.json')) {
              console.log('No diagnosis result found, skipping comment');
              return;
            }
            
            let diagnosis = {};
            try {
              diagnosis = JSON.parse(fs.readFileSync('diagnosis_result.json', 'utf8'));
            } catch (e) {
              console.log('Failed to parse diagnosis:', e.message);
              return;
            }
            
            const issue_type = diagnosis.classification?.category || 'Unknown';
            const confidence = ((diagnosis.confidence || 0) * 100).toFixed(1);
            const latency = diagnosis.total_latency_ms || 'N/A';
            const diagnosis_text = diagnosis.diagnosis || 'Unable to determine root cause';
            const suggestions = (diagnosis.fix_suggestions || []).slice(0, 5);
            const patch = diagnosis.patch_recommendation || '';
            
            let comment = `## 🔍 Automated CI/CD Failure Diagnosis\n\n`;
            comment += `**Issue Type:** ${issue_type}\n\n`;
            comment += `### Root Cause\n${diagnosis_text}\n\n`;
            comment += `### Suggested Fixes\n`;
            
            for (let i = 0; i < suggestions.length; i++) {
              comment += `${i + 1}. ${suggestions[i]}\n`;
            }
            
            if (patch && patch.length < 500) {
              comment += `\n### Recommended Patch\n\`\`\`\n${patch}\n\`\`\`\n`;
            }
            
            comment += `\n**Confidence:** ${confidence}%  \n`;
            comment += `**Analysis Time:** ${latency}ms`;
            
            try {
              await github.rest.issues.createComment({
                issue_number: ${{ steps.find-pr.outputs.pr-number }},
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
              console.log('Posted diagnosis comment');
            } catch (e) {
              console.log('Could not post comment:', e.message);
            }

      - name: Stop Copilot API
        if: always()
        run: pkill -f "uvicorn" || true
