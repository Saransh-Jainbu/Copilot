# Render Deployment Configuration
# See: https://render.com/docs/yaml-spec

services:
  - type: web
    name: ci-failure-diagnosis-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: HUGGINGFACE_API_TOKEN
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: APP_ENV
        value: production
    healthCheckPath: /api/health
    plan: free
