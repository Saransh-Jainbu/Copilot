name: DevOps Copilot CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # --- Lint ---
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linter
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/ tests/

  # --- Test ---
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-report=html 2>&1 | tee test-output.log
        continue-on-error: true

      - name: Upload test logs and coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-output.log
            coverage.xml
            htmlcov/

  # --- Docker Build ---
  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devops-copilot:${{ github.sha }} .

      - name: Test Docker image
        run: |
          docker run --rm -d --name copilot-test -p 8000:8000 devops-copilot:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/api/health || exit 1
          docker stop copilot-test
