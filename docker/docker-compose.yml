version: "3.9"

services:
  # --- Edge Layer ---
  edge:
    build:
      context: ..
      dockerfile: docker/Dockerfile.edge
    env_file:
      - ../.env
    volumes:
      - shared-data:/app/data
    environment:
      - LOG_LEVEL=INFO

  # --- Fog Layer ---
  fog:
    build:
      context: ..
      dockerfile: docker/Dockerfile.fog
    env_file:
      - ../.env
    volumes:
      - shared-data:/app/data
    environment:
      - LOG_LEVEL=INFO
    depends_on:
      - edge

  # --- Cloud Layer (API) ---
  cloud-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cloud
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    volumes:
      - shared-data:/app/data
    environment:
      - HUGGINGFACE_API_TOKEN=${HUGGINGFACE_API_TOKEN}
      - LOG_LEVEL=INFO
    depends_on:
      - fog

volumes:
  shared-data:
